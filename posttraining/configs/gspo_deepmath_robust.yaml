# Model
model_path: "tencent/WeDLM-8B-Base"
trust_remote_code: true

# Mode
training_mode: "gspo"

# Data
train_data: "data/train.jsonl"
max_seq_length: 2048

# GSPO
gspo_train_data: "data/train-deepmath-00000-of-00001.parquet"
gspo_ref_model_path: null
gspo_group_size: 4
gspo_min_candidates_per_group: 2
gspo_max_prompt_length: 512
gspo_max_new_tokens: 256
gspo_rollout_temperature: 0.8
gspo_rollout_top_p: 0.95
gspo_rollout_top_k: 0
gspo_score_temperature: 1.0
gspo_reward_temperature: 1.0
gspo_ref_alpha: 1.0
gspo_kl_coef: 0.0

# Reward shaping (conservative start)
gspo_reward_beta: 0.2
gspo_reward_source: "deepmath_correctness_margin"
gspo_reward_length_penalty: 0.0
gspo_reward_callable: null
gspo_reward_clip_min: null
gspo_reward_clip_max: null
gspo_deepmath_correct_bonus: 1.0
gspo_deepmath_wrong_penalty: 0.2
# Numeric equivalence tolerances for answers like 0.5 vs 1/2
gspo_deepmath_numeric_atol: 1.0e-6
gspo_deepmath_numeric_rtol: 1.0e-5
# Avoid penalizing ambiguous/unjudgeable extraction results
gspo_deepmath_penalize_only_when_confident: true

# WeDLM
block_size: 32
mask_per_block: true
loss_weighting_scheme: "weighted"
mask_eps: 1.0e-8
num_learnable_im_end: 0

# AR loss
enable_ar_loss: true
ar_loss_weight: 1.0

# Attention
attention_backend: "dense"

# Training
output_dir: "outputs/wedlm-gspo-deepmath-robust"
num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 3.0e-6
lr_scheduler_type: "cosine"
warmup_ratio: 0.1
weight_decay: 0.01
max_grad_norm: 1.0

# Cache
rebuild_cache: false

# DeepSpeed
use_deepspeed: true
deepspeed_zero_stage: 2
deepspeed_offload_optimizer: true
deepspeed_offload_param: false

# Logging
logging_steps: 10
save_steps: 500
save_total_limit: 3

# Device & Seed
bf16: true
seed: 42
