# Model
model_path: "tencent/WeDLM-8B-Base"
trust_remote_code: true

# Data
train_data: "data/alpaca_cleaned_sft.jsonl"
max_seq_length: 2048

# Mode
training_mode: "dpo"  # "sft", "dpo" or "gspo"

# DPO scaffold (increment 1/2)
dpo_train_data: "data/pairwise_train.jsonl"
dpo_beta: 0.1
dpo_ref_model_path: null
dpo_length_norm: true
dpo_block_reduce: "mean"
dpo_seq_reduce: "mean"
dpo_num_mask_samples: 4

# Online GSPO
gspo_train_data: null
gspo_ref_model_path: null
gspo_group_size: 4
gspo_min_candidates_per_group: 2
gspo_max_prompt_length: 1536
gspo_max_new_tokens: 256
gspo_rollout_temperature: 0.8
gspo_rollout_top_p: 0.95
gspo_rollout_top_k: 0
gspo_score_temperature: 1.0
gspo_reward_temperature: 1.0
gspo_ref_alpha: 1.0
gspo_kl_coef: 0.0
gspo_reward_beta: 0.1
gspo_reward_source: "policy_ref_margin"  # policy_ref_margin | length_penalized_margin | deepmath_correctness_margin | callable
gspo_reward_length_penalty: 0.0
gspo_reward_callable: null  # e.g. my_reward_module:compute_reward
gspo_reward_clip_min: null
gspo_reward_clip_max: null
gspo_deepmath_correct_bonus: 1.0
gspo_deepmath_wrong_penalty: 0.0

# WeDLM
block_size: 32
mask_per_block: true
loss_weighting_scheme: "weighted" 
mask_eps: 1.0e-8
num_learnable_im_end: 0

# AR loss
enable_ar_loss: true
ar_loss_weight: 1.0

# Attention: "magi" or "dense"
attention_backend: "dense"

# Training
output_dir: "outputs/wedlm-sft"
num_train_epochs: 1
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
learning_rate: 3.0e-6
lr_scheduler_type: "cosine"
warmup_ratio: 0.1
weight_decay: 0.01
max_grad_norm: 1.0

# Cache
rebuild_cache: false

# DeepSpeed
use_deepspeed: true
deepspeed_zero_stage: 2
deepspeed_offload_optimizer: true
deepspeed_offload_param: false

# Logging
logging_steps: 10
save_steps: 500
save_total_limit: 3

# Device & Seed
bf16: true
seed: 42

# WandB (optional)
# use_wandb: true
# wandb_project: "wedlm-sft"
# wandb_team: null
# wandb_group: null
# For private deployment:
# wandb_host: ""
# wandb_key: ""

